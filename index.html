<script>
    var observarPopup = new MutationObserver(function(mutations) {
        // Desconectamos temporalmente para evitar el bucle infinito al modificar el DOM
        observarPopup.disconnect();

        var popupContent = document.getElementById('popup-content');
        if (popupContent) {
            var links = popupContent.getElementsByTagName('a');
            var modificado = false;

            for (var i = 0; i < links.length; i++) {
                var url = links[i].href;
                if (url.includes("lh3.googleusercontent") && !links[i].querySelector('img')) {
                    try {
                        links[i].innerHTML = '<img src="' + url + '" style="width:120px; height:auto; border-radius:5px; border:1px solid #ccc; display:block; margin-top:5px;" alt="Ver imagen">';
                        modificado = true;
                    } catch (e) {
                        console.error("Error al procesar enlace de Drive", e);
                    }
                }
            }
        }

        // Volvemos a conectar el observador para el siguiente clic en el mapa
        conectarObservador();
    });

    function conectarObservador() {
        var target = document.getElementById('popup');
        if (target) {
            observarPopup.observe(target, { childList: true, subtree: true });
        }
    }

    // Inicio inicial
    conectarObservador();
</script>
